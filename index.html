<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #000000;
    --bg1:     #080808;
    --bg2:     #101010;
    --border:  #202020;
    --border2: #2e2e2e;
    --accent:  #d4a853;
    --accent2: #b8894a;
    --text:    #e0e0e0;
    --text2:   #999999;
    --text3:   #444444;
    --blue:    #5b8dee;
    --green:   #3ecf6a;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width:100%; height:100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%;
  }

  .shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100vw;
  }

  /* ── TOP BAR ── */
  .topbar {
    height: 90px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: relative;
  }

  .clock {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 4.2rem;
    letter-spacing: 8px;
    color: var(--accent);
    line-height: 1;
  }

  .datestr {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 4px;
    color: var(--text2);
    text-transform: uppercase;
    text-align: center;
    margin-top: 2px;
  }

  .topbar-live {
    position: absolute;
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 10px var(--green);
    animation: blink 2.5s ease-in-out infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }

  .live-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--text3);
    letter-spacing: 2px;
  }

  /* ── MAIN WEATHER AREA ── */
  .main {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    padding: 0 40px;
    justify-content: center;
    gap: 0;
  }

  /* Today hero */
  .today-hero {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 48px;
    padding: 20px 0 16px;
  }

  .today-icon {
    font-size: 8rem;
    line-height: 1;
    filter: drop-shadow(0 0 24px rgba(212,168,83,.2));
  }

  .today-right {}

  .today-temp-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
    line-height: 1;
  }

  .today-temp {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 9rem;
    color: var(--accent);
    letter-spacing: 2px;
    line-height: 1;
  }

  .today-unit {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 4rem;
    color: var(--text3);
    line-height: 1;
    padding-bottom: 8px;
  }

  .today-desc {
    font-size: 1.4rem;
    color: var(--text2);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 300;
    margin-top: 2px;
  }

  .today-city {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--text3);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .today-meta {
    display: flex;
    gap: 36px;
    margin-top: 12px;
  }

  .meta-item {
    display: flex; flex-direction: column; gap: 3px;
  }

  .meta-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--text3);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .meta-value {
    font-size: 1.1rem;
    color: var(--text2);
    font-weight: 500;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0 8px;
  }

  /* 5-day row */
  .week-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    padding: 6px 0 16px;
  }

  .day-card {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 10px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    transition: border-color .2s, background .2s;
  }

  .day-card.today-card {
    border-color: var(--accent2);
    background: var(--bg2);
  }

  .day-name {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text2);
  }

  .day-card.today-card .day-name { color: var(--accent); }

  .day-icon { font-size: 2.4rem; line-height: 1; }

  .day-hi {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    color: var(--text);
    line-height: 1;
  }

  .day-lo {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--text3);
  }

  .day-rain {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--blue);
    letter-spacing: 1px;
  }

  /* ── TICKER ── */
  .ticker-bar {
    height: 46px;
    flex-shrink: 0;
    background: var(--bg1);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  .ticker-label {
    flex-shrink: 0;
    background: var(--accent);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 3px;
    padding: 0 18px;
    height: 100%;
    display: flex;
    align-items: center;
    z-index: 2;
  }

  .ticker-fade {
    position: absolute;
    left: 100px;
    width: 50px;
    height: 100%;
    background: linear-gradient(90deg, var(--bg1), transparent);
    z-index: 1;
    pointer-events: none;
  }

  .ticker-overflow {
    overflow: hidden;
    flex: 1;
    height: 100%;
    display: flex;
    align-items: center;
  }

  .ticker-track {
    display: flex;
    align-items: center;
    white-space: nowrap;
    will-change: transform;
  }

  .ticker-item {
    display: inline-flex;
    align-items: center;
    padding: 0 44px;
    font-size: 0.95rem;
    color: var(--text2);
    letter-spacing: 0.3px;
    font-weight: 400;
  }

  .ticker-item::before {
    content: '◆';
    color: var(--accent2);
    font-size: 0.45rem;
    margin-right: 44px;
    opacity: 0.8;
  }

  .ticker-src {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--accent);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-right: 12px;
  }

  .weather-loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    height: 100%;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--text3);
    letter-spacing: 2px;
  }

  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="shell">

  <div class="topbar">
    <div>
      <div class="clock" id="clock">00:00:00</div>
      <div class="datestr" id="datestr">—</div>
    </div>
    <div class="topbar-live">
      <div class="live-dot"></div>
      <div class="live-label">LIVE</div>
    </div>
  </div>

  <div class="main" id="weatherArea">
    <div class="weather-loading"><div class="spinner"></div>FETCHING WEATHER…</div>
  </div>

  <div class="ticker-bar">
    <div class="ticker-label">ABC NEWS</div>
    <div class="ticker-fade"></div>
    <div class="ticker-overflow">
      <div class="ticker-track" id="tickerTrack">
        <span class="ticker-item"><span class="ticker-src">LOADING</span>Fetching latest headlines…</span>
      </div>
    </div>
  </div>

</div>
<script>
// ── SCHEDULED REFRESH ──────────────────────────────────────────────────
// Refresh at 05:00 and 18:00 Melbourne time (AEST UTC+10 / AEDT UTC+11)
function scheduleRefresh() {
  const now = new Date();
  // Get Melbourne local time
  const melbStr = now.toLocaleString('en-AU', { timeZone: 'Australia/Melbourne', hour:'numeric', minute:'numeric', hour12: false });
  const [h, m] = melbStr.split(':').map(Number);
  const nowMinutes = h * 60 + m;
  const targets = [5 * 60, 18 * 60]; // 05:00 and 18:00

  // Find next target
  let nextMins = targets.find(t => t > nowMinutes);
  if (nextMins === undefined) nextMins = targets[0] + 24 * 60; // tomorrow 05:00

  const msUntil = (nextMins - nowMinutes) * 60 * 1000 - (now.getSeconds() * 1000 + now.getMilliseconds());
  setTimeout(() => { location.reload(); }, msUntil > 0 ? msUntil : 60000);
}
scheduleRefresh();

// Also reload if page has been open >6 hours (failsafe)
setTimeout(() => location.reload(), 6 * 60 * 60 * 1000);

// ── CLOCK ──────────────────────────────────────────────────────────────
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function updateClock() {
  const n = new Date();
  const p = v => String(v).padStart(2,'0');
  document.getElementById('clock').textContent = `${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
  document.getElementById('datestr').textContent =
    `${DAYS[n.getDay()]}  ·  ${n.getDate()} ${MONTHS[n.getMonth()]} ${n.getFullYear()}`;
}
setInterval(updateClock, 1000);
updateClock();

// ── WMO MAPS ──────────────────────────────────────────────────────────
const WMO_ICON = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'🌨️',75:'❄️',80:'🌦️',81:'🌧️',82:'🌩️',95:'⛈️',96:'⛈️',99:'⛈️'};
const WMO_DESC = {0:'Clear Sky',1:'Mainly Clear',2:'Partly Cloudy',3:'Overcast',45:'Fog',48:'Icy Fog',51:'Light Drizzle',53:'Drizzle',55:'Heavy Drizzle',61:'Light Rain',63:'Rain',65:'Heavy Rain',71:'Light Snow',73:'Snow',75:'Heavy Snow',80:'Showers',81:'Heavy Showers',82:'Violent Showers',95:'Thunderstorm',96:'Thunderstorm',99:'Thunderstorm'};
const DAY_SHORT = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

// ── WEATHER ───────────────────────────────────────────────────────────
async function fetchWeather() {
  const lat = -37.8136, lon = 144.9631, cityName = 'Melbourne, VIC';
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weathercode,apparent_temperature&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_probability_max&timezone=Australia%2FMelbourne&forecast_days=5`;
  try {
    const r = await fetch(url);
    const d = await r.json();
    renderWeather(d, cityName);
  } catch(e) {
    document.getElementById('weatherArea').innerHTML =
      `<div class="weather-loading">⚠ WEATHER UNAVAILABLE — will retry</div>`;
    setTimeout(fetchWeather, 60000);
  }
}

function renderWeather(d, cityName) {
  const cur   = d.current;
  const daily = d.daily;
  const icon  = WMO_ICON[cur.weathercode] || '🌡️';
  const desc  = WMO_DESC[cur.weathercode] || '';

  const weekCards = daily.time.map((dateStr, i) => {
    const dt   = new Date(dateStr + 'T12:00:00');
    const name = i === 0 ? 'TODAY' : DAY_SHORT[dt.getDay()];
    const hi   = Math.round(daily.temperature_2m_max[i]);
    const lo   = Math.round(daily.temperature_2m_min[i]);
    const ic   = WMO_ICON[daily.weathercode[i]] || '🌡️';
    const rain = daily.precipitation_probability_max[i];
    return `
      <div class="day-card${i===0?' today-card':''}">
        <div class="day-name">${name}</div>
        <div class="day-icon">${ic}</div>
        <div class="day-hi">${hi}°</div>
        <div class="day-lo">Low ${lo}°</div>
        ${rain ? `<div class="day-rain">💧 ${rain}%</div>` : ''}
      </div>`;
  }).join('');

  document.getElementById('weatherArea').innerHTML = `
    <div class="today-hero">
      <div class="today-icon">${icon}</div>
      <div class="today-right">
        <div class="today-temp-row">
          <div class="today-temp">${Math.round(cur.temperature_2m)}</div>
          <div class="today-unit">°C</div>
        </div>
        <div class="today-desc">${desc}</div>
        <div class="today-city">${cityName}</div>
        <div class="today-meta">
          <div class="meta-item">
            <span class="meta-label">Feels Like</span>
            <span class="meta-value">${Math.round(cur.apparent_temperature)}°C</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Humidity</span>
            <span class="meta-value">${cur.relative_humidity_2m}%</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Wind</span>
            <span class="meta-value">${Math.round(cur.wind_speed_10m)} km/h</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Rain Chance</span>
            <span class="meta-value">${daily.precipitation_probability_max[0]}%</span>
          </div>
        </div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="week-row">${weekCards}</div>
  `;
}

// ── TICKER / RSS ───────────────────────────────────────────────────────
// Multiple proxies to try in order
const PROXIES = [
  url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
];

// ABC News RSS feeds
const ABC_FEEDS = [
  'https://www.abc.net.au/news/feed/51120/rss.xml',
  'https://www.abc.net.au/news/feed/2942460/rss.xml',
  'https://www.abc.net.au/news/feed/9489562/rss.xml',
];

async function fetchWithProxy(feedUrl) {
  for (const makeUrl of PROXIES) {
    try {
      const proxyUrl = makeUrl(feedUrl);
      const r = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
      if (!r.ok) continue;
      const text = await r.text();

      // allorigins wraps in JSON
      let xmlText = text;
      try {
        const j = JSON.parse(text);
        if (j.contents) xmlText = j.contents;
      } catch {}

      const xml = new DOMParser().parseFromString(xmlText, 'text/xml');
      const items = [...xml.querySelectorAll('item')];
      if (items.length === 0) continue;

      return items.slice(0, 15).map(it => ({
        title: it.querySelector('title')?.textContent?.trim() || '',
      })).filter(x => x.title.length > 5);
    } catch {}
  }
  return [];
}

let tickerAnimFrame = null;
let tickerPos = 0;
let tickerSpeed = 0.6; // px per frame — comfortable reading speed

async function loadTicker() {
  // Try feeds one by one until we get results
  let allItems = [];
  for (const feed of ABC_FEEDS) {
    const items = await fetchWithProxy(feed);
    allItems = allItems.concat(items);
    if (allItems.length >= 10) break;
  }

  // Dedupe
  const seen = new Set();
  const unique = allItems.filter(x => {
    if (seen.has(x.title)) return false;
    seen.add(x.title);
    return true;
  });

  if (unique.length === 0) {
    // Retry in 2 minutes
    setTimeout(loadTicker, 2 * 60 * 1000);
    return;
  }

  buildTicker(unique);
  // Refresh headlines every 15 min
  setTimeout(loadTicker, 15 * 60 * 1000);
}

function escHtml(s) {
  return s.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#\d+;/g,'').replace(/&[a-z]+;/g,'');
}

function buildTicker(items) {
  if (tickerAnimFrame) cancelAnimationFrame(tickerAnimFrame);

  const track = document.getElementById('tickerTrack');
  const makeSpan = item =>
    `<span class="ticker-item"><span class="ticker-src">ABC</span>${escHtml(item.title)}</span>`;

  // Triple duplicate so we always have content flowing
  const html = items.map(makeSpan).join('');
  track.innerHTML = html + html + html;
  track.style.transform = 'translateX(0)';
  tickerPos = 0;

  // Wait a frame for layout, then measure one-set width
  requestAnimationFrame(() => {
    const oneSetWidth = track.scrollWidth / 3;

    function animate() {
      tickerPos += tickerSpeed;
      if (tickerPos >= oneSetWidth) tickerPos = 0;
      track.style.transform = `translateX(${-tickerPos}px)`;
      tickerAnimFrame = requestAnimationFrame(animate);
    }
    animate();
  });
}

// ── INIT ───────────────────────────────────────────────────────────────
fetchWeather();
loadTicker();

// Weather refresh every 20 min
setInterval(fetchWeather, 20 * 60 * 1000);

// Reconnect watchdog: if online event fires after offline, reload page
window.addEventListener('online', () => {
  setTimeout(() => location.reload(), 3000);
});
</script>
</body>
</html>
