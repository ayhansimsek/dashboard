<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Family Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  /* ── User Selected Colors ───────────────────────────── */
  --bg:       #CBE2FE;   /* Ana Arkaplan */
  --bg2:      #e6f7fc;
  --bg3:      #c2e5df;
  --card:     #FFE8F0;   /* Beyaz/Pembe Kart Arkaplanı */
  --card2:    #f0faf8;
  --border:   #aaddd5;
  --text:     #1a3a36;   
  --text2:    #3d6b65;
  --text3:    #6ea099;
  --accent:   #0db89e;   
  --accent2:  #ff8c42;   
  --green:    #22c55e;
  --green-bg: #dcfce7;
  --pink:     #f06292;
  --purple:   #9c6fdd;
  --yellow:   #f59e0b;
  --yellow-bg:#fef9c3;
  --red:      #ef4444;
  --red-bg:   #fee2e2;
  --sky:      #38bdf8;

  /* Activity colors */
  --col-reading: #2563eb;
  --col-math:    #16a34a;
  --col-writing: #d97706;
  --col-dance:   #db2777;
  --col-tv:      #7c3aed;
  --col-routine: #dc2626;

  --radius: 16px;
  --radius-sm: 12px;
  --shadow: 0 4px 12px rgba(0,0,0,0.05);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

/* ── 1 Tam Ekran - Sayfa Kaydırması Kapalı ── */
html, body {
  width: 100%; height: 100%;
  overflow: hidden; 
  background: var(--bg);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
}

/* ── IPAD PORTRAIT GRID LAYOUT ── */
.dashboard {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto auto 1fr; 
  grid-template-areas:
    "header header"
    "timer  ha"
    "sched  cal";
  gap: 12px;
  padding: 12px;
  width: 100vw; 
  height: 100vh;
  overflow: hidden;
}

/* Modül Atamaları */
.header-area { grid-area: header; }
.timer-area  { grid-area: timer; }
.ha-area     { grid-area: ha; }
.sched-area  { grid-area: sched; }
.cal-area    { grid-area: cal; }

/* CARDS GENEL */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  box-shadow: var(--shadow);
  display: flex; 
  flex-direction: column;
  overflow: hidden; /* Dışa taşmayı engelle */
}
.card-title {
  font-size: 11px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--text3); margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px; flex-shrink: 0;
}
.card-title span { font-size: 14px; }

/* ── HEADER ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; flex-shrink: 0; padding: 10px 20px;
}
.header-left { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.header-emoji { font-size: 28px; }
.header-title { font-family: 'Baloo 2', sans-serif; font-size: 22px; font-weight: 800; color: var(--accent); }

.clock-block { text-align: center; flex-shrink: 0; }
.clock-time { 
  font-family: 'Baloo 2', sans-serif; font-size: 36px; font-weight: 800; color: var(--text); 
  line-height: 1; letter-spacing: 1px; display: flex; align-items: baseline; justify-content: center; gap: 6px; 
}
.clock-ampm { font-size: 14px; color: var(--text3); font-weight: 800; letter-spacing: 0px; }
.clock-icon { font-size: 26px; line-height: 1; transform: translateY(3px); }
.clock-date { font-size: 13px; color: var(--text3); margin-top: 2px; font-weight: 700; }

.header-weather { flex: 1; overflow: hidden; display: flex; justify-content: flex-end;}
.header-wx-now { display: flex; align-items: center; gap: 8px; }
.header-wx-icon { font-size: 28px; line-height: 1; }
.header-wx-temp { font-family: 'Baloo 2', sans-serif; font-size: 28px; font-weight: 800; color: var(--text); line-height: 1; }
.header-wx-desc { font-size: 12px; color: var(--text2); font-weight: 700; }
.header-wx-range { font-size: 11px; color: var(--text3); }

/* ── TIMER (Küçültüldü) ── */
.timer-presets { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; justify-content: center;}
.timer-preset-btn {
  background: var(--bg2); border: 1.5px solid var(--border); border-radius: 16px;
  color: var(--text2); font-size: 11px; font-weight: 800; padding: 4px 8px;
  cursor: pointer; transition: all 0.15s;
}
.timer-preset-btn:active { background: var(--accent); color: #fff; border-color: var(--accent); }

.timer-layout { display: flex; align-items: center; gap: 12px; }
.timer-display { flex-shrink: 0; text-align: center; background: var(--bg2); border-radius: var(--radius-sm); padding: 8px; width: 100px; }
.timer-ring-wrap { position: relative; width: 80px; height: 80px; margin: 0 auto; }
.timer-ring { transform: rotate(-90deg); }
.timer-ring-bg { fill: none; stroke: var(--border); stroke-width: 6; }
.timer-ring-progress { fill: none; stroke: var(--green); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
.timer-time  { font-family: 'Baloo 2', sans-serif; font-size: 22px; font-weight: 800; color: var(--text); line-height: 1.1; margin-top: 10px;}
.timer-label { font-size: 9px; color: var(--text3); }

.timer-controls-wrap { flex: 1; display: flex; flex-direction: column; gap: 6px; }
.timer-controls { display: flex; gap: 4px; }
.timer-btn {
  flex: 1; padding: 6px; border-radius: 8px; border: none; font-size: 12px; font-weight: 800; color: #fff; cursor: pointer;
}
.timer-btn-start { background: var(--green); }
.timer-btn-pause { background: var(--yellow); }
.timer-btn-reset { background: var(--red); }
.timer-custom { display: flex; gap: 4px; }
.timer-custom input { flex: 1; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; font-size: 12px; padding: 4px 8px; text-align: center; }
.timer-custom button { background: var(--accent); color: #fff; border: none; border-radius: 6px; font-size: 11px; font-weight: 800; padding: 4px 10px; }

/* ── HOME ASSISTANT (Küçültüldü) ── */
.ha-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; flex:1;}
.ha-tile {
  background: var(--bg2); border-radius: var(--radius-sm);
  padding: 8px; cursor: pointer; border: 1.5px solid var(--border);
  display: flex; flex-direction: column; justify-content: center; align-items: center;
}
.ha-tile.on      { border-color: var(--sky);    background: #eff9ff; }
.ha-tile.on.warm { border-color: var(--yellow); background: #fffbeb; }
.ha-tile.on.pink { border-color: var(--pink);   background: #fff0f5; }
.ha-tile-icon  { font-size: 20px; margin-bottom: 2px; }
.ha-tile-name  { font-size: 10px; font-weight: 800; color: var(--text2); text-align: center;}
.ha-tile-state { font-size: 9px; color: var(--text3); }
.ha-tile.on      .ha-tile-state { color: var(--sky); }
.ha-tile.on.warm .ha-tile-state { color: var(--yellow); }
.ha-tile.on.pink .ha-tile-state { color: var(--pink); }

.vacuum-btns { display: flex; gap: 2px; margin-top: 4px; width: 100%;}
.vacuum-btn {
  flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 4px;
  color: var(--text2); font-size: 9px; font-weight: 800; padding: 4px; text-align: center;
}
.vacuum-btn.start { border-color: var(--green); color: var(--green); }
.vacuum-btn.dock  { border-color: var(--yellow); color: var(--yellow); }

/* ── SCHEDULE ── */
.schedule-day-tabs { display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap; flex-shrink: 0;}
.day-tab {
  padding: 6px 10px; border-radius: 16px; font-size: 11px; font-weight: 800;
  border: 1.5px solid var(--border); background: var(--bg2); color: var(--text3); cursor: pointer;
}
.day-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.day-tab.today-tab { border-color: var(--yellow); }

.sched-section-label { font-size: 10px; font-weight: 900; color: var(--text3); padding: 4px 2px; text-transform: uppercase;}
.schedule-list {
  flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; padding-right: 4px;
}
.schedule-list::-webkit-scrollbar { width: 4px; }
.schedule-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.schedule-item {
  display: flex; align-items: center; gap: 10px; border-radius: var(--radius-sm);
  padding: 10px; border: 2px solid var(--border); background: var(--bg2); min-height: 54px;
}
.schedule-item.done { background: var(--green-bg) !important; border-color: var(--green) !important; }
.schedule-item.routine { cursor: pointer; }

.sched-check {
  width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900;
}
.sched-check.routine-unchecked { background: var(--red-bg); border: 2px solid var(--red); color: var(--red); }
.sched-check.routine-checked   { background: var(--green); border: 2px solid var(--green); color: #fff; }
.sched-check.act-unchecked { background: var(--bg3); border: 2px solid var(--border); color: var(--text3); font-size: 14px;}
.sched-check.act-checked   { background: var(--green); border: 2px solid var(--green); color: #fff; }

.schedule-icon { font-size: 24px; width: 28px; text-align: center; flex-shrink: 0; }
.schedule-info { flex: 1; min-width: 0; }
.schedule-name { font-size: 14px; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.schedule-sub  { font-size: 10px; color: var(--text3); margin-top: 1px; }
.schedule-timer-btn {
  background: var(--bg3); border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 16px; padding: 4px 8px; opacity: 0.75;
}

/* ── CALENDAR ── */
.calendar-wrap { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
.calendar-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-shrink: 0;}
.cal-nav-btn { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-weight: 800; cursor: pointer; }
.cal-month { font-family: 'Baloo 2', sans-serif; font-size: 16px; font-weight: 800; color: var(--accent); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; flex-shrink: 0;}
.cal-day-header { text-align: center; font-size: 10px; font-weight: 800; color: var(--text3); padding: 2px; }
.cal-day {
  text-align: center; border-radius: 6px; padding: 4px 2px; font-size: 12px; min-height: 28px;
  display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer;
}
.cal-day:hover { background: var(--bg2); }
.cal-day.today { background: var(--accent); color: #fff; font-weight: 900; }
.cal-day.other-month { opacity: 0.35; }
.cal-dot { width: 5px; height: 5px; border-radius: 50%; }

.events-list { margin-top: 8px; overflow-y: auto; flex: 1; padding-right: 2px;}
.events-list::-webkit-scrollbar { width: 4px; }
.events-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.event-item { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 8px; background: var(--bg2); margin-bottom: 4px; }
.event-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.event-text { flex: 1; }
.event-title { font-size: 12px; font-weight: 800; color: var(--text); }
.event-time  { font-size: 10px; color: var(--text3); }
.add-event-btn { margin-top: 8px; padding: 8px; background: var(--bg2); border: 1.5px dashed var(--border); border-radius: 8px; font-size: 12px; font-weight: 800; color: var(--text3); flex-shrink: 0; cursor: pointer;}

/* TOAST */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--green); color: #fff; padding: 10px 20px; border-radius: 20px; font-weight: 800; font-size: 14px; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.timer-alarm { animation: pulse 0.6s infinite; color: var(--red) !important; }
</style>
</head>
<body>
<div class="dashboard">

  <div class="card header-area header">
    <div class="header-left">
      <div class="header-emoji">🌟</div>
      <div class="header-title">Family Dashboard</div>
    </div>
    <div class="clock-block">
      <div class="clock-time" id="clockTime">--:--</div>
      <div class="clock-date" id="clockDate">--</div>
    </div>
    <div class="header-weather">
      <div class="header-wx-now">
        <div class="header-wx-icon" id="hdr-wx-icon">⏳</div>
        <div>
          <div style="display:flex;align-items:flex-end;gap:2px;">
            <div class="header-wx-temp" id="hdr-wx-temp">--</div>
            <span style="font-size:12px;color:var(--text3);padding-bottom:3px;">°C</span>
          </div>
          <div class="header-wx-desc" id="hdr-wx-desc">Loading…</div>
        </div>
      </div>
    </div>
  </div>

  <div class="card timer-area">
    <div class="card-title"><span>⏱</span> Timer</div>
    <div class="timer-presets">
      <button class="timer-preset-btn" onclick="setTimer(5)">5m</button>
      <button class="timer-preset-btn" onclick="setTimer(10)">10m</button>
      <button class="timer-preset-btn" onclick="setTimer(15)">15m</button>
      <button class="timer-preset-btn" onclick="setTimer(20)">20m</button>
      <button class="timer-preset-btn" onclick="setTimer(30)">30m</button>
    </div>
    <div class="timer-layout">
      <div class="timer-display">
        <div class="timer-ring-wrap">
          <svg class="timer-ring" viewBox="0 0 100 100" width="80" height="80">
            <circle class="timer-ring-bg" cx="50" cy="50" r="44"/>
            <circle class="timer-ring-progress" id="timerRing" cx="50" cy="50" r="44"
              stroke-dasharray="276.46" stroke-dashoffset="0"/>
          </svg>
          <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;">
            <div class="timer-time" id="timerDisplay">00:00</div>
          </div>
        </div>
      </div>
      <div class="timer-controls-wrap">
        <div class="timer-controls">
          <button class="timer-btn timer-btn-start" onclick="timerStart()">▶</button>
          <button class="timer-btn timer-btn-pause" onclick="timerPause()">⏸</button>
          <button class="timer-btn timer-btn-reset" onclick="timerReset()">↺</button>
        </div>
        <div class="timer-custom">
          <input type="number" id="customMinutes" placeholder="min" min="1">
          <button onclick="setTimerCustom()">Set</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card ha-area">
    <div class="card-title"><span>🏠</span> Home Assistant</div>
    <div class="ha-grid">
      <div class="ha-tile warm" id="ha-livingroom" onclick="haToggle('ha-livingroom')">
        <div class="ha-tile-icon">💡</div>
        <div class="ha-tile-name">Living Room</div>
        <div class="ha-tile-state">Off</div>
      </div>
      <div class="ha-tile warm" id="ha-bedroom" onclick="haToggle('ha-bedroom')">
        <div class="ha-tile-icon">🛏</div>
        <div class="ha-tile-name">Bedroom</div>
        <div class="ha-tile-state">Off</div>
      </div>
      <div class="ha-tile pink" id="ha-kidroom" onclick="haToggle('ha-kidroom')">
        <div class="ha-tile-icon">🧒</div>
        <div class="ha-tile-name">Kid's Room</div>
        <div class="ha-tile-state">Off</div>
      </div>
      <div class="ha-tile" style="padding:4px;">
        <div class="ha-tile-name" style="margin-bottom:2px;">🤖 Vacuum</div>
        <div class="vacuum-btns">
          <button class="vacuum-btn start" onclick="vacuumCmd('start')">▶</button>
          <button class="vacuum-btn dock"  onclick="vacuumCmd('dock')">⏏</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card sched-area">
    <div class="card-title"><span>📋</span> Weekly Schedule</div>
    <div class="schedule-day-tabs" id="scheduleTabs"></div>
    <div class="schedule-list" id="scheduleList"></div>
  </div>

  <div class="card cal-area">
    <div class="card-title"><span>📅</span> Family Calendar</div>
    <div class="calendar-wrap">
      <div class="calendar-nav">
        <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
        <div class="cal-month" id="calMonth">--</div>
        <button class="cal-nav-btn" onclick="calNav(1)">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="events-list" id="eventsList"></div>
      <button class="add-event-btn" onclick="openAddEvent()">+ Add Event</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
/* ── Home Assistant ── */
const HA_ENABLED = false; // Sunucuyu kurduğunda bunu true yapıp IP'ni girebilirsin.
const HA_URL     = "http://192.168.9.x:8123"; 
const HA_TOKEN   = "YOUR_LONG_LIVED_TOKEN_HERE";

/* SCHEDULE & ROUTINES */
const ROUTINES = {
  morning: [{ id:"r-brush-am", name:"Brush Teeth", icon:"🪥" }],
  evening: [{ id:"r-brush-pm", name:"Brush Teeth", icon:"🪥" }, { id:"r-vitamin-pm", name:"Take Vitamin", icon:"💊" }]
};

const SCHEDULE = {
  Monday: [{ name:"Reading", icon:"📖", duration:15, color:"--col-reading", time:"After school" }],
  Tuesday: [{ name:"Writing Practice", icon:"✏️", duration:15, color:"--col-writing", time:"After school" }],
  Wednesday: [{ name:"Maths", icon:"🔢", duration:15, color:"--col-math", time:"After school" }],
  Thursday: [{ name:"Dance Class", icon:"💃", duration:45, color:"--col-dance", time:"4:00 PM" }],
  Friday: [{ name:"Screen Time", icon:"📺", duration:30, color:"--col-tv", time:"Evening" }],
  Saturday: [{ name:"Reading", icon:"📖", duration:20, color:"--col-reading", time:"Morning" }, { name:"TV Time", icon:"🎬", duration:30, color:"--col-tv", time:"Afternoon" }],
  Sunday: [{ name:"Maths", icon:"🔢", duration:20, color:"--col-math", time:"Afternoon" }, { name:"Writing", icon:"✏️", duration:15, color:"--col-writing", time:"Afternoon" }]
};

const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
let events = [];

/* YENİLEME (REFRESH) SAATLERİ */
const REFRESH_TIMES = [{h:6,m:0},{h:11,m:59},{h:15,m:0},{h:18,m:0},{h:21,m:0},{h:23,m:59}];

function updateClock() {
  const n = new Date(); let h = n.getHours(); const m = n.getMinutes(); const s = n.getSeconds();
  const ampm = h >= 12 ? 'PM' : 'AM';
  let icon = '🌙'; if (h>=6 && h<12) icon='🌅'; else if(h>=12 && h<17) icon='☀️'; else if(h>=17 && h<20) icon='🌤️';
  
  if (s === 0) REFRESH_TIMES.forEach(t => { if(h===t.h && m===t.m) window.location.reload(); });
  h = h % 12; h = h ? h : 12;

  document.getElementById('clockTime').innerHTML = String(h)+':'+String(m).padStart(2,'0')+`<span class="clock-ampm">${ampm}</span> <span class="clock-icon">${icon}</span>`;
  document.getElementById('clockDate').textContent = DAYS[n.getDay()]+', '+n.getDate()+' '+MONTHS[n.getMonth()];
}
setInterval(updateClock, 1000); updateClock();

/* HAVA DURUMU (Özet) */
async function loadWeather() {
  try {
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=-37.8136&longitude=144.9631&current=temperature_2m,weathercode`);
    const d=await r.json();
    document.getElementById('hdr-wx-temp').textContent = Math.round(d.current.temperature_2m);
    document.getElementById('hdr-wx-desc').textContent = "Melbourne";
  } catch(e){}
}
loadWeather(); setInterval(loadWeather, 10*60*1000);

/* TIMER (Çevre boyutu svg r=44 olduğu için 2*PI*44 = 276.46) */
let timerTotal=0,timerLeft=0,timerInterval=null,timerRunning=false;
const CIRC=276.46;
function setTimer(min){timerReset();timerTotal=min*60;timerLeft=timerTotal;updateTimerDisplay();}
function setTimerCustom(){const v=parseInt(document.getElementById('customMinutes').value);if(v>0)setTimer(v);}
function updateTimerDisplay(){
  const m=Math.floor(timerLeft/60), s=timerLeft%60;
  document.getElementById('timerDisplay').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  const ring=document.getElementById('timerRing');
  ring.style.strokeDashoffset=CIRC*(1-(timerTotal>0?timerLeft/timerTotal:1));
  ring.style.stroke=timerLeft<=10?'var(--red)':timerLeft<=60?'var(--yellow)':'var(--green)';
}
function timerStart(){
  if(timerLeft<=0||timerRunning)return; timerRunning=true;
  timerInterval=setInterval(()=>{
    timerLeft--; updateTimerDisplay();
    if(timerLeft<=0){clearInterval(timerInterval);timerRunning=false;showToast('⏰ Time is up!');}
  },1000);
}
function timerPause(){clearInterval(timerInterval);timerRunning=false;}
function timerReset(){clearInterval(timerInterval);timerRunning=false;timerLeft=timerTotal; timerTotal?updateTimerDisplay():(document.getElementById('timerDisplay').textContent='00:00',document.getElementById('timerRing').style.strokeDashoffset=0);}

/* SCHEDULE LOGIC - BUG FIXED */
let selectedDay = DAYS[new Date().getDay()];
// Rutin Key artık gün ismini içeriyor, böylece Pazartesi fırçalaması Salı'yı etkilemiyor!
function routineKey(id){ return 'rtn:' + selectedDay + ':' + id; }
function actKey(day,idx){ return 'act:' + day + ':' + idx; }
function getC(k){ return localStorage.getItem(k)==='1'; }
function setC(k,v){ localStorage.setItem(k,v?'1':'0'); renderSchedule(); }

function buildTabs(){
  const wrap=document.getElementById('scheduleTabs'); wrap.innerHTML='';
  const today=DAYS[new Date().getDay()];
  DAYS.forEach(day=>{
    const b=document.createElement('button');
    b.className='day-tab'+(day===today?' today-tab':'')+(day===selectedDay?' active':'');
    b.textContent=day.slice(0,3);
    b.onclick=()=>{selectedDay=day;buildTabs();renderSchedule();};
    wrap.appendChild(b);
  });
}

function renderSchedule(){
  const list=document.getElementById('scheduleList'); list.innerHTML='';
  
  const mlbl=document.createElement('div'); mlbl.className='sched-section-label'; mlbl.textContent='☀️ Morning'; list.appendChild(mlbl);
  ROUTINES.morning.forEach(r=>{
    const done=getC(routineKey(r.id)), div=document.createElement('div');
    div.className='schedule-item routine'+(done?' done':'');
    div.onclick=()=>setC(routineKey(r.id), !done);
    div.innerHTML=`<div class="sched-check ${done?'routine-checked':'routine-unchecked'}">${done?'✓':'✗'}</div><div class="schedule-icon">${r.icon}</div><div class="schedule-info"><div class="schedule-name">${r.name}</div></div>`;
    list.appendChild(div);
  });

  const albl=document.createElement('div'); albl.className='sched-section-label'; albl.textContent='📚 Activities'; list.appendChild(albl);
  (SCHEDULE[selectedDay]||[]).forEach((item,i)=>{
    const done=getC(actKey(selectedDay,i)), col=`var(${item.color})`;
    const div=document.createElement('div'); div.className='schedule-item'+(done?' done':'');
    div.style.borderLeftWidth='4px'; div.style.borderLeftColor=col;
    div.innerHTML=`<div class="sched-check ${done?'act-checked':'act-unchecked'}" onclick="setC('${actKey(selectedDay,i)}',${!done});event.stopPropagation();">${done?'✓':''}</div><div class="schedule-icon">${item.icon}</div><div class="schedule-info"><div class="schedule-name" style="color:${done?'var(--green)':col}">${item.name}</div><div class="schedule-sub">${item.duration}m</div></div><button class="schedule-timer-btn" onclick="setTimer(${item.duration});event.stopPropagation();">⏱</button>`;
    list.appendChild(div);
  });
}
buildTabs(); renderSchedule();

/* CALENDAR BÖLÜMÜ (Özet render, kodun önceki fonksiyonlarıyla aynı mantık) */
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth();
function renderCalendar(){
  document.getElementById('calMonth').textContent=MONTHS[calMonth]+' '+calYear;
  const grid=document.getElementById('calGrid'); grid.innerHTML='';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d=>{ grid.innerHTML+=`<div class="cal-day-header">${d}</div>`; });
  const first=new Date(calYear,calMonth,1).getDay(), dim=new Date(calYear,calMonth+1,0).getDate(), today=new Date();
  for(let i=0;i<first;i++) grid.innerHTML+=`<div class="cal-day other-month">-</div>`;
  for(let dd=1;dd<=dim;dd++){
    const isT=dd===today.getDate()&&calMonth===today.getMonth()&&calYear===today.getFullYear();
    grid.innerHTML+=`<div class="cal-day${isT?' today':''}">${dd}</div>`;
  }
}
function calNav(d){ calMonth+=d; if(calMonth>11){calMonth=0;calYear++;} else if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
renderCalendar();

function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
function haToggle(id) { showToast('Home Assistant tetiklendi: ' + id); }
function vacuumCmd(cmd) { showToast('Süpürge komutu: ' + cmd); }
</script>
